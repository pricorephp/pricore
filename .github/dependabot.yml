version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - php
    ignore:
      - dependency-name: spatie/laravel-typescript-transformer
        # Dependabot's PHP 8.4 platform lacks a patch version, causing
        # roave/better-reflection (~8.4.1) resolution failures

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
